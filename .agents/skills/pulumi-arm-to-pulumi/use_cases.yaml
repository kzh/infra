queries:
  # Conversion + import workflows
  - "Convert the ARM template and import the resources into Pulumi"
  - "Convert my ARM code to a Pulumi Typescript program"
  - "Convert my ARM code to a Pulumi Typescript program and import the existing resources"

  # Migration requests
  - "Migrate our Azure ARM templates to Pulumi"
